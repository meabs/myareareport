services:
  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    env_file:
      - .env
    # No direct port exposure — all traffic via Caddy
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  web:
    build:
      context: ../apps/web
      dockerfile: Dockerfile
    environment:
      - NEXT_PUBLIC_API_URL=http://api:8000
    depends_on:
      - api
    restart: unless-stopped

  mcp:
    build:
      context: ../apps/mcp
      dockerfile: Dockerfile
    environment:
      - API_URL=http://api:8000
      - MCP_TRANSPORT=sse
      - WIDGET_BASE_URL=https://${DOMAIN}
    depends_on:
      - api
      - web
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3
    environment:
      - DOMAIN=${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data       # TLS certificates (persists across restarts)
      - caddy_config:/config
    depends_on:
      - api
      - web
      - mcp
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
